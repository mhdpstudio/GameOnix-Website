<!DOCTYPE html>

            <div class="sb-footer">
                <ul class="menu-list" style="list-style: none;">
                    <li class="menu-item">
                        <a href="https://ipn.eg/S/mahmoudpro123/instapay/7uIXkH" class="menu-link" target="_blank"
                            rel="noopener noreferrer">
                            <span class="material-symbols-rounded">volunteer_activism</span>
                            <span class="menu-label">InstaPay Support</span>

        <div class="content">

            <div class="search-bar">
                <span class="search-icon"><i class="fa-solid fa-magnifying-glass"></i></span>

            <div class="container2">

                        </div>
                    </div>
                </div>
                <div class="sidebar" id="sidebar"></div>
            </div>


            <div id="games-container">
                <div class="game-group">
                    <div class="games-cards">
                        <div class="card card-1" data-slug="forza-horizon-5">
                            <img src="../../assets/content/images/forza-horizon-5.png" alt="Forza Horizon 5"
                                class="game-img">
                            <div class="left"></div>
                            <div class="right"></div>
                            <div class="buttons-actions">
                                <button class="buy"><i class="fa-solid fa-download"></i> Download</button>
                                <button class="icon"><i class="fa-solid fa-bug"></i></button>
                            </div>
                        </div>
                        <div class="card card-2" data-slug="ac-mirage">
                            <img src="../../assets/content/images/ac-mirage.png" alt="Assassin's Creed Mirage"
                                class="game-img">
                            <div class="left"></div>
                            <div class="right"></div>
                            <div class="buttons-actions">
                                <button class="buy"><i class="fa-solid fa-download"></i> Download</button>
                                <button class="icon"><i class="fa-solid fa-bug"></i></button>
                            </div>
                        </div>
                    </div>


                    <div class="games-cards">
                        <div class="card card-3" data-slug="cyberpunk-2077">
                            <img src="../../assets/content/images/cyberpunk-2077.png" alt="Cyberpunk 2077"
                                class="game-img">
                            <div class="left"></div>
                            <div class="right"></div>
                            <div class="buttons-actions">
                                <button class="buy"><i class="fa-solid fa-download"></i> Download</button>
                                <button class="icon"><i class="fa-solid fa-bug"></i></button>
                            </div>
                        </div>
                        <div class="card card-4" data-slug="ghost-of-tsushima">
                            <img src="../../assets/content/images/ghost-of-tsushima.png" alt="Ghost of Tsushima"
                                class="game-img">
                            <div class="left"></div>
                            <div class="right"></div>
                            <div class="buttons-actions">
                                <button class="buy"><i class="fa-solid fa-download"></i> Download</button>
                                <button class="icon"><i class="fa-solid fa-bug"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="store-layout">
                <div id="store-game-cards" class="store-games-list"></div>

                <aside id="store-popular-sidebar" class="store-popular-sidebar">
                    <h3>Popular Games</h3>
                    <div id="store-popular-list"></div>

                    <div class="store-sections">
                        <h3 class="sections-title">Sections</h3>
                        <div id="store-sections-list"></div>
                    </div>
                </aside>
            </div>
        </div>
    </div>


</body>

<script>
    const version = new Date().getTime(); // رقم نسخة ديناميكي

    // CSS Files
    const cssFiles = [
        "../css/sidebar-style.css",
        "../css/games-page.css",
        "../css/search-style.css",
        "../css/cards-style.css",
        "../css/theme-btn.css"
    ];
    cssFiles.forEach(file => {
        const link = document.createElement("link");
        link.rel = "stylesheet";
        link.href = `${file}?v=${version}`;
        document.head.appendChild(link);
    });

    // JS Files
    const jsFiles = [
        "../js/sidebar-script.js",
        "../js/games-page.js",
        "../js/icon.js"
    ];
    jsFiles.forEach(file => {
        const script = document.createElement("script");
        script.src = `${file}?v=${version}`;
        document.body.appendChild(script);
    });
</script>

<script>
    window.addEventListener('load', () => {
        if (!sessionStorage.getItem('pageRefreshed')) {
            sessionStorage.setItem('pageRefreshed', 'true');
            location.reload(true); // يجبر المتصفح على تحميل الصفحة بدون cache
        }
    });
</script>

</html>

</html>
