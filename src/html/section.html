<!-- Disable right-click, Ctrl+U, F12, and Developer Tools -->
<script>
    // Disable right-click context menu
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        return false;
    });

    // Disable keyboard shortcuts for viewing source and developer tools
    document.addEventListener('keydown', function(e) {
        // Disable Ctrl+U (View Source)
        if (e.ctrlKey && e.key === 'u') {
            e.preventDefault();
            return false;
        }
        // Disable F12 (Developer Tools)
        if (e.key === 'F12') {
            e.preventDefault();
            return false;
        }
        // Disable Ctrl+Shift+I (Developer Tools)
        if (e.ctrlKey && e.shiftKey && e.key === 'I') {
            e.preventDefault();
            return false;
        }
        // Disable Ctrl+Shift+J (Console)
        if (e.ctrlKey && e.shiftKey && e.key === 'J') {
            e.preventDefault();
            return false;
        }
        // Disable Ctrl+Shift+C (Inspector)
        if (e.ctrlKey && e.shiftKey && e.key === 'C') {
            e.preventDefault();
            return false;
        }
        // Disable Ctrl+S (Save)
        if (e.ctrlKey && e.key === 's') {
            e.preventDefault();
            return false;
        }
        // Disable Ctrl+P (Print)
        if (e.ctrlKey && e.key === 'p') {
            e.preventDefault();
            return false;
        }
    });

    // Additional protection: Clear selection on mousedown to prevent text selection
    document.addEventListener('mousedown', function(e) {
        if (e.button === 0) { // Left click
            // Allow normal left click functionality
        }
    });
</script>

<script>
    // رقم نسخة ديناميكي
    const version = new Date().getTime();

    // CSS Files
    const cssFiles = [
        "../css/sidebar-style.css",
        "../css/section-page.css",
        "../css/search-style.css",
        "../css/cards-style.css",
        "../css/theme-btn.css"
    ];

    cssFiles.forEach(file => {
        const link = document.createElement("link");
        link.rel = "stylesheet";
        link.href = `${file}?v=${version}`;
        document.head.appendChild(link);
    });

    // JS Files مع تحديد إذا كان module أو لا
    const jsFiles = [
        { src: "../js/section-page.js", module: true },
        { src: "../js/sidebar-script.js", module: false },
        { src: "../js/icon.js", module: false }
    ];

    jsFiles.forEach(file => {
        const script = document.createElement("script");
        script.src = `${file.src}?v=${version}`;

        if (file.module) {
            script.type = "module";
        }

        document.body.appendChild(script);
    });
</script>

<script>
    // Hide loading screen when page is fully loaded (with 1 second delay)
    // Skip loading screen if page is loaded from bfcache (back-forward cache)
    window.addEventListener('load', () => {
        // Check if page was loaded from bfcache (back-forward cache)
        if (performance.getEntriesByType("navigation")[0]?.type === "back_forward") {
            // Page loaded from bfcache - skip loading screen immediately
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
                loadingScreen.remove();
            }
            return;
        }
        
        // Normal page load - show loading screen with 1 second delay
        setTimeout(() => {
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
                loadingScreen.style.opacity = '0';
                loadingScreen.style.visibility = 'hidden';
                setTimeout(() => {
                    loadingScreen.remove();
                }, 500);
            }
            
            if (!sessionStorage.getItem('pageRefreshed')) {
                sessionStorage.setItem('pageRefreshed', 'true');
                location.reload(true);
            }
        }, 1000);
    });
</script>

<!-- Service Worker for automatic cache busting -->
