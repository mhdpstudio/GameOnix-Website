                    <li class="menu-item">

                    <li class="menu-item">

                <span class="search-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
                <input type="text" id="searchBox" placeholder="Search games...">
            </div>
            <div id="section-text"></div>
            <div id="section-games" class="grid"></div>
        </div>
    </div>


</body>

<script>
    // رقم نسخة ديناميكي
    const version = new Date().getTime();

    // CSS Files
    const cssFiles = [
        "../css/sidebar-style.css",
        "../css/section-page.css",
        "../css/search-style.css",
        "../css/cards-style.css",
        "../css/theme-btn.css"
    ];

    cssFiles.forEach(file => {
        const link = document.createElement("link");
        link.rel = "stylesheet";
        link.href = `${file}?v=${version}`;
        document.head.appendChild(link);
    });

    // JS Files مع تحديد إذا كان module أو لا
    const jsFiles = [
        { src: "../js/section-page.js", module: true },
        { src: "../js/sidebar-script.js", module: false },
        { src: "../js/icon.js", module: false }
    ];

    jsFiles.forEach(file => {
        const script = document.createElement("script");
        script.src = `${file.src}?v=${version}`;

        if (file.module) {
            script.type = "module";
        }

        document.body.appendChild(script);
    });
</script>

<script>
    window.addEventListener('load', () => {
        if (!sessionStorage.getItem('pageRefreshed')) {
            sessionStorage.setItem('pageRefreshed', 'true');
            location.reload(true); // يجبر المتصفح على تحميل الصفحة بدون cache
        }
    });
</script>

</html>

</html>
