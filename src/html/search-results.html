<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v7.2.0/css/all.css">
    <title></title>
    <link rel="stylesheet" href="../css/sidebar-style.css">
    <link rel="stylesheet" href="../css/search-results.css">
    <link rel="stylesheet" href="../css/search-style.css">
    <link rel="stylesheet" href="../css/cards-style.css">
    <link rel="stylesheet" href="../css/theme-btn.css">
</head>

<body class="dark-theme">
    <button class="theme-changer"><i class="fa-solid fa-moon"></i></button>
    <button class="menu-toggle"><i class="fa-solid fa-bars"></i></button>

    <div class="container">
        <aside class="sb closed">
            <header class="sb-h">
                <a href="../index.html" rel="noopener noreferrer">
                    <img src="../../assets/images/Logo.png" alt="Logo" class="logo" loading="lazy" decoding="async">
                    <h2 class="sb-text">GameOnix</h2>
                </a>
                <button class="sb-toggle"><span class="material-symbols-rounded">chevron_left</span></button>
            </header>

            <div class="sb-content">
                <ul class="menu-list">
                    <li class="menu-item">
                        <a href="../index.html" class="menu-link" rel="noopener noreferrer">
                            <span class="material-symbols-rounded">home</span>
                            <span class="menu-label">Home</span>
                        </a>
                    </li>
                    <li class="menu-item">
                        <a href="games.html" class="menu-link" rel="noopener noreferrer">
                            <span class="material-symbols-rounded">stadia_controller</span>
                            <span class="menu-label">Games</span>
                        </a>
                    </li>
                    <li class="menu-item">
                        <a href="games-news.html" class="menu-link" rel="noopener noreferrer">
                            <span class="material-symbols-rounded">newspaper</span>
                            <span class="menu-label">Games News</span>
                        </a>
                    </li>
                    <li class="menu-item">
                        <a href="request-game.html" class="menu-link" rel="noopener noreferrer">
                            <span class="material-symbols-rounded">person_raised_hand</span>
                            <span class="menu-label">Request Game</span>
                        </a>
                    </li>
                </ul>
            </div>
            <div class="sb-footer">
                <ul class="menu-list" style="list-style: none;">
                    <li class="menu-item">
                        <a href="https://ipn.eg/S/mahmoudpro123/instapay/7uIXkH" class="menu-link" target="_blank"
                            rel="noopener noreferrer">
                            <span class="material-symbols-rounded">volunteer_activism</span>
                            <span class="menu-label">InstaPay Support</span>
                        </a>
                    </li>
                </ul>
            </div>
        </aside>

        <div class="content">
            <div class="search-bar">
                <span class="search-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
                <input type="text" class="searchBox" id="searchBox" placeholder="Search games...">
            </div>
            <div id="search-results" class="grid"></div>
        </div>
    </div>


</body>

<script src="../js/sidebar-script.js"></script>
<script src="../js/search-results.js"></script>
<script src="../js/icon.js"></script>

<script>
    // رقم نسخة ديناميكي
    const version = new Date().getTime();

    // CSS Files
    const cssFiles = [
        "../css/sidebar-style.css",
        "../css/search-results.css",
        "../css/search-style.css",
        "../css/cards-style.css",
        "../css/theme-btn.css"
    ];
    cssFiles.forEach(file => {
        const link = document.createElement("link");
        link.rel = "stylesheet";
        link.href = `${file}?v=${version}`;
        document.head.appendChild(link);
    });

    // JS Files
    const jsFiles = [
        "../js/sidebar-script.js",
        "../js/search-results.js",
        "../js/icon.js"
    ];
    jsFiles.forEach(file => {
        const script = document.createElement("script");
        script.src = `${file}?v=${version}`;
        document.body.appendChild(script);
    });
</script>

</html>
</html>
