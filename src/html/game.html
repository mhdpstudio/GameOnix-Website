<body class="dark-theme">

        display: flex;

        ">Loading...</p>
    </div>
    <style>
        @keyframes spin {

    </style>

                </a>
                <button class="sb-toggle"><span class="material-symbols-rounded">chevron_left</span></button>
            </header>

            <div class="sb-content">
                <ul class="menu-list">
                    <li class="menu-item">
                        <a href="../index.html" class="menu-link" rel="noopener noreferrer">

                    </li>
                    <li class="menu-item">
                        <a href="games.html" class="menu-link" rel="noopener noreferrer">
                            <span class="material-symbols-rounded">stadia_controller</span>
                            <span class="menu-label">Games</span>
                        </a>
                    </li>
                    <li class="menu-item">
                        <a href="games-news.html" class="menu-link" rel="noopener noreferrer">
                            <span class="material-symbols-rounded">newspaper</span>
                            <span class="menu-label">Games News</span>

                    </li>
                    <li class="menu-item">

            </div>

            <div class="sb-footer">
                <ul class="menu-list" style="list-style: none;">
                    <li class="menu-item">
                        <a href="https://ipn.eg/S/mahmoudpro123/instapay/7uIXkH" class="menu-link" target="_blank"
                            rel="noopener noreferrer">
                            <span class="material-symbols-rounded">volunteer_activism</span>

        <div class="content">
            <div id="game-page"></div>

        </div>
    </div>

    <div id="sharePopup" class="share-popup">
        <div class="share-box">
            <h3>Share this game</h3>

                <button id="copyBtn">Copy</button>
            </div>

            <button class="close-share">Close</button>
        </div>
    </div>
</body>

<script>
    const version = new Date().getTime(); // رقم نسخة ديناميكي

    // CSS Files
    const cssFiles = [
        "../css/sidebar-style.css",
        "../css/game-page.css",
        "../css/theme-btn.css"
    ];
    cssFiles.forEach(file => {
        const link = document.createElement("link");
        link.rel = "stylesheet";
        link.href = `${file}?v=${version}`;
        document.head.appendChild(link);
    });

    // JS Files
    const jsFiles = [
        "../js/game-page.js",
        "../js/sidebar-script.js",
        "../js/icon.js"
    ];
    jsFiles.forEach(file => {
        const script = document.createElement("script");
        script.src = `${file}?v=${version}`;
        document.body.appendChild(script);
    });
</script>

<script>
    // Hide loading screen when page is fully loaded (with 1 second delay)
    // Skip loading screen if page is loaded from bfcache (back-forward cache)
    window.addEventListener('load', () => {
        // Check if page was loaded from bfcache (back-forward cache)
        if (performance.getEntriesByType("navigation")[0]?.type === "back_forward") {
            // Page loaded from bfcache - skip loading screen immediately
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
                loadingScreen.remove();
            }
            return;
        }
        
        // Normal page load - show loading screen with 1 second delay
        setTimeout(() => {
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
                loadingScreen.style.opacity = '0';
                loadingScreen.style.visibility = 'hidden';
                setTimeout(() => {
                    loadingScreen.remove();
                }, 500);
            }
            
            if (!sessionStorage.getItem('pageRefreshed')) {
                sessionStorage.setItem('pageRefreshed', 'true');
                location.reload(true);
            }
        }, 1000);
    });
</script>

<!-- Service Worker for automatic cache busting -->
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('../sw.js')
        .then(reg => console.log('Service Worker registered'))
        .catch(err => console.log('Service Worker registration failed:', err));
}
</script>
