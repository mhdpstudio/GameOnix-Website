    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />

                <a href="index.html" rel="noopener noreferrer">
                    <img src="../assets/images/Logo.png" alt="Logo" class="logo" loading="lazy" decoding="async">

                </a>
                <button class="sb-toggle"><span class="material-symbols-rounded">chevron_left</span></button>
            </header>

            <div class="sb-content">
                <ul class="menu-list">
                    <li class="menu-item">
                        <a href="index.html" class="menu-link active" rel="noopener noreferrer">

                        </a>
                    </li>
                    <li class="menu-item">
                        <a href="html/games.html" class="menu-link" rel="noopener noreferrer">

                    </li>
                    <li class="menu-item">
                        <a href="html/games-news.html" class="menu-link" rel="noopener noreferrer">
                            <span class="material-symbols-rounded">newspaper</span>
                            <span class="menu-label">Games News</span>

                    </li>
                    <li class="menu-item">

            <div class="sb-footer">
                <ul class="menu-list" style="list-style: none;">
                    <li class="menu-item">
                        <a href="https://ipn.eg/S/mahmoudpro123/instapay/7uIXkH" class="menu-link" target="_blank"
                            rel="noopener noreferrer">
                            <span class="material-symbols-rounded">volunteer_activism</span>
                            <span class="menu-label">InstaPay Support</span>

                </ul>
            </div>
        </aside>

        <div class="content">
            <div id="games-container">

            </div>
        </div>
    </div>


</body>

<script>
    // Timestamp جديد لكل تحميل صفحة
    const version = new Date().getTime();

    // CSS
    const cssFiles = [
        "css/sidebar-style.css",
        "css/index-style.css",
        "css/cards-style.css",
        "css/theme-btn.css"
    ];
    cssFiles.forEach(file => {
        const link = document.createElement("link");
        link.rel = "stylesheet";
        link.href = `${file}?v=${version}`;
        document.head.appendChild(link);
    });

    // JS
    const jsFiles = [
        "js/sidebar-script.js",
        "js/index-script.js",
        "js/icon.js"
    ];
    jsFiles.forEach(file => {
        const script = document.createElement("script");
        script.src = `${file}?v=${version}`;
        document.body.appendChild(script);
    });
</script>

<script>
    window.addEventListener('load', () => {
        if (!sessionStorage.getItem('pageRefreshed')) {
            sessionStorage.setItem('pageRefreshed', 'true');
            location.reload(true); // يجبر المتصفح على تحميل الصفحة بدون cache
        }
    });
</script>

</html>

</html>
